<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPulse — Nutrition</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

  <nav class="sidebar">
    <div class="logo"><i class="ti ti-heart-rate"></i><span>FitPulse</span></div>
    <ul class="nav-links">
      <li><a href="../index.html"><i class="ti ti-dashboard"></i> Dashboard</a></li>
      <li><a href="guide.html"><i class="ti ti-list-check"></i> Setup Guide</a></li>
      <li><a href="workout.html"><i class="ti ti-barbell"></i> Workouts</a></li>
      <li class="active"><a href="nutrition.html"><i class="ti ti-salad"></i> Nutrition</a></li>
    </ul>
    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="userNameDisplay">Set up profile</span>
    </div>
  </nav>

  <div class="page-wrap">
    <h1>Nutrition</h1>
    <p class="page-sub">Track your daily food and manage your calorie targets.</p>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:1.5rem;" id="macroCards">
      <!-- filled by JS -->
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem;">
      <div class="chart-card">
        <div class="chart-header"><span class="chart-title">Macro split</span></div>
        <canvas id="macroChart" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-header"><span class="chart-title">Weekly calorie intake</span></div>
        <canvas id="weekCalChart" height="200"></canvas>
      </div>
    </div>

    <h2 class="section-title" style="margin-bottom:12px;">Log a meal</h2>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">
        <div class="field-group" style="margin:0;">
          <label class="field-label">Meal name</label>
          <input type="text" id="mealName" placeholder="e.g. Oats &amp; banana" />
        </div>
        <div class="field-group" style="margin:0;">
          <label class="field-label">Calories</label>
          <input type="number" id="mealCal" placeholder="e.g. 420" min="0" />
        </div>
        <div class="field-group" style="margin:0;">
          <label class="field-label">Meal type</label>
          <select id="mealType">
            <option>Breakfast</option><option>Lunch</option>
            <option>Snack</option><option>Dinner</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" onclick="logMeal()"><i class="ti ti-plus"></i> Add meal</button>
    </div>

    <h2 class="section-title" style="margin-bottom:12px;">Today's meals</h2>
    <div id="mealList"></div>
  </div>

  <script src="../js/storage.js"></script>
  <script>
    const MEAL_COLORS = { Breakfast:'#1D9E75', Lunch:'#378ADD', Snack:'#EF9F27', Dinner:'#D85A30' };
    let macroChart, weekCalChart;

    function renderMacroCards() {
      const nut = Store.get('nutrition') || { calories: 1850, protein: 139, carbs: 231, fat: 62 };
      const meals = Store.get('meals') || [];
      const todayStr = new Date().toISOString().split('T')[0];
      const todayMeals = meals.filter(m => m.date === todayStr);
      const consumed = todayMeals.reduce((a, m) => a + m.cal, 0);
      const remaining = Math.max(0, nut.calories - consumed);
      document.getElementById('macroCards').innerHTML = `
        <div class="metric-card">
          <div class="metric-label"><i class="ti ti-target" style="color:#1D9E75;"></i> Daily target</div>
          <div class="metric-val">${nut.calories.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text-muted);">kcal / day</div>
        </div>
        <div class="metric-card">
          <div class="metric-label"><i class="ti ti-flame" style="color:#D85A30;"></i> Consumed today</div>
          <div class="metric-val">${consumed.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text-muted);">kcal logged</div>
        </div>
        <div class="metric-card">
          <div class="metric-label"><i class="ti ti-minus" style="color:#378ADD;"></i> Remaining</div>
          <div class="metric-val">${remaining.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text-muted);">kcal left</div>
        </div>
        <div class="metric-card">
          <div class="metric-label"><i class="ti ti-salad" style="color:#7F77DD;"></i> Meals logged</div>
          <div class="metric-val">${todayMeals.length}</div>
          <div style="font-size:11px;color:var(--text-muted);">today</div>
        </div>
      `;
    }

    function renderCharts() {
      const nut = Store.get('nutrition') || { protein: 139, carbs: 231, fat: 62 };
      if (macroChart) macroChart.destroy();
      macroChart = new Chart(document.getElementById('macroChart'), {
        type: 'doughnut',
        data: {
          labels: ['Protein','Carbs','Fat'],
          datasets: [{ data: [nut.protein * 4, nut.carbs * 4, nut.fat * 9], backgroundColor: ['#1D9E75','#378ADD','#EF9F27'], borderWidth: 0 }]
        },
        options: { responsive: true, cutout: '60%', plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } } } }
      });

      const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const baseTarget = nut.calories || 1850;
      const weekVals = [1820, 1950, 1780, 2050, 1700, 1880, 1600];
      if (weekCalChart) weekCalChart.destroy();
      weekCalChart = new Chart(document.getElementById('weekCalChart'), {
        type: 'bar',
        data: {
          labels: days,
          datasets: [
            { label: 'Intake', data: weekVals, backgroundColor: '#85B7EB', borderRadius: 4 },
            { label: 'Target', data: Array(7).fill(baseTarget), type: 'line', borderColor: '#1D9E75', borderDash: [4,3], borderWidth: 1.5, pointRadius: 0, fill: false }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 }, color: '#9ca3af' } },
            y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 }, color: '#9ca3af' }, min: 1200, max: 2600 }
          }
        }
      });
    }

    function renderMeals() {
      const meals = Store.get('meals') || [];
      const todayStr = new Date().toISOString().split('T')[0];
      const todayMeals = meals.filter(m => m.date === todayStr).reverse();
      const el = document.getElementById('mealList');
      if (!todayMeals.length) {
        el.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">No meals logged today yet.</p>';
        return;
      }
      el.innerHTML = todayMeals.map((m, i) => `
        <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${MEAL_COLORS[m.type]||'#888'};flex-shrink:0;"></div>
          <div style="flex:1;">
            <div style="font-size:13.5px;font-weight:600;">${m.name}</div>
            <div style="font-size:12px;color:var(--text-muted);">${m.type}</div>
          </div>
          <div style="font-size:13px;font-weight:600;color:var(--text);">${m.cal} kcal</div>
        </div>
      `).join('');
    }

    function logMeal() {
      const name = document.getElementById('mealName').value.trim();
      const cal = parseInt(document.getElementById('mealCal').value);
      const type = document.getElementById('mealType').value;
      if (!name || !cal) return alert('Please enter a meal name and calories.');
      const meals = Store.get('meals') || [];
      const date = new Date().toISOString().split('T')[0];
      meals.push({ name, cal, type, date });
      Store.set('meals', meals);
      document.getElementById('mealName').value = '';
      document.getElementById('mealCal').value = '';
      renderMacroCards(); renderMeals();
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderMacroCards(); renderCharts(); renderMeals();
    });
  </script>
</body>
</html>
